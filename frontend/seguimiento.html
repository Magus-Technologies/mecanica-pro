<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Seguimiento de mi vehiculo</title>
<style>
:root{--bg:#0d0f14;--bg2:#13161e;--bg3:#1a1e2a;--border:#252a38;--accent:#f97316;--green:#22c55e;--red:#ef4444;--blue:#3b82f6;--yellow:#eab308;--text:#e8eaf0;--text2:#8b92a8}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',Arial,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.header{background:var(--bg2);border-bottom:1px solid var(--border);padding:14px 18px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:10}
.header-logo{width:34px;height:34px;background:var(--accent);border-radius:9px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:18px}
.header h1{font-size:1rem;font-weight:700}
.header p{font-size:.75rem;color:var(--text2)}
.container{max-width:620px;margin:0 auto;padding:18px 14px 40px}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:18px 16px;margin-bottom:14px}
.card-title{font-weight:700;margin-bottom:14px;font-size:.9rem;display:flex;align-items:center;gap:6px}
.estado-hero{text-align:center;padding:24px 20px}
.estado-icon{font-size:2.8rem;margin-bottom:10px}
.estado-label{font-size:1.2rem;font-weight:700;margin-bottom:6px}
.estado-sub{font-size:.85rem;color:var(--text2)}
.progreso-bar{margin:18px 0 0;background:var(--bg3);border-radius:20px;height:8px;overflow:hidden}
.progreso-fill{height:100%;border-radius:20px;background:var(--accent);transition:width .6s ease}
.progreso-labels{display:flex;justify-content:space-between;font-size:.7rem;color:var(--text2);margin-top:5px}
.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.info-item label{display:block;font-size:.7rem;color:var(--text2);text-transform:uppercase;letter-spacing:.04em;margin-bottom:3px}
.info-item span{font-size:.88rem;font-weight:600}
table{width:100%;border-collapse:collapse;font-size:.84rem}
th{text-align:left;padding:7px 10px;color:var(--text2);font-size:.73rem;text-transform:uppercase;border-bottom:1px solid var(--border)}
td{padding:9px 10px;border-bottom:1px solid rgba(37,42,56,.5)}
tr:last-child td{border-bottom:none}
.costo-box{background:rgba(249,115,22,.08);border:1px solid rgba(249,115,22,.2);border-radius:10px;padding:14px 16px;display:flex;justify-content:space-between;align-items:center;margin-top:12px}
.costo-box .label{font-size:.82rem;color:var(--text2)}
.costo-box .monto{font-size:1.5rem;font-weight:800;color:var(--accent)}
.timeline{position:relative;padding-left:26px}
.timeline::before{content:'';position:absolute;left:8px;top:0;bottom:0;width:2px;background:var(--border)}
.tl-item{position:relative;margin-bottom:14px}
.tl-dot{position:absolute;left:-26px;width:18px;height:18px;border-radius:50%;background:var(--bg3);border:2px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:.6rem;top:2px}
.tl-done .tl-dot{background:rgba(34,197,94,.15);border-color:var(--green);color:var(--green)}
.tl-current .tl-dot{background:rgba(249,115,22,.15);border-color:var(--accent);color:var(--accent);animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(249,115,22,.4)}50%{box-shadow:0 0 0 5px rgba(249,115,22,0)}}
.tl-content{font-size:.84rem;font-weight:600}
.tl-time{font-size:.73rem;color:var(--text2);margin-top:2px}
.evidencias{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.evidencias img{width:100%;aspect-ratio:1;object-fit:cover;border-radius:8px;cursor:pointer;border:1px solid var(--border)}
.skeleton{background:linear-gradient(90deg,var(--bg3) 25%,var(--border) 50%,var(--bg3) 75%);background-size:200%;animation:shimmer 1.4s infinite;border-radius:8px}
@keyframes shimmer{from{background-position:200%}to{background-position:-200%}}
.footer{text-align:center;padding:20px;color:var(--text2);font-size:.75rem}
.error-card{text-align:center;padding:40px 20px}
@media(max-width:420px){.info-grid{grid-template-columns:1fr}.evidencias{grid-template-columns:repeat(2,1fr)}}
</style>
</head>
<body>
<div class="header">
  <div class="header-logo">&#10003;</div>
  <div>
    <h1>MecanicaPro</h1>
    <p>Seguimiento de tu vehiculo</p>
  </div>
</div>

<div class="container" id="content">
  <div class="card"><div class="skeleton" style="height:140px;border-radius:10px"></div></div>
  <div class="card"><div class="skeleton" style="height:90px;border-radius:8px"></div></div>
  <div class="card"><div class="skeleton" style="height:160px;border-radius:8px"></div></div>
</div>

<div class="footer" id="footer"></div>

<script>
var API_BASE = '/mecanica/api';
var parts = window.location.pathname.split('/').filter(Boolean);
var token = parts[parts.length - 1];

var ESTADOS = [
  {key:'pendiente',   label:'Recibido',      icon:'&#128229;'},
  {key:'diagnostico', label:'Diagnostico',   icon:'&#128269;'},
  {key:'aprobado',    label:'Aprobado',      icon:'&#9989;'},
  {key:'en_proceso',  label:'En reparacion', icon:'&#128295;'},
  {key:'terminado',   label:'Terminado',     icon:'&#10004;&#65039;'},
  {key:'facturado',   label:'Facturado',     icon:'&#129534;'},
  {key:'entregado',   label:'Entregado',     icon:'&#127881;'},
];

var ESTADO_CFG = {
  pendiente:   {color:'#eab308', pct:10,  desc:'Su vehiculo ha sido recibido y esta en espera de revision.'},
  diagnostico: {color:'#3b82f6', pct:25,  desc:'Nuestro tecnico esta analizando su vehiculo.'},
  aprobado:    {color:'#22c55e', pct:40,  desc:'El presupuesto fue aprobado, pronto iniciamos la reparacion.'},
  rechazado:   {color:'#ef4444', pct:0,   desc:'El presupuesto fue rechazado.'},
  en_proceso:  {color:'#f97316', pct:60,  desc:'Su vehiculo esta siendo reparado por nuestro equipo.'},
  terminado:   {color:'#a855f7', pct:85,  desc:'La reparacion ha terminado.'},
  facturado:   {color:'#22c55e', pct:95,  desc:'Listo para recoger. Por favor pase por el taller.'},
  entregado:   {color:'#22c55e', pct:100, desc:'Vehiculo entregado. Gracias por confiar en nosotros!'},
  cancelado:   {color:'#6b7280', pct:0,   desc:'Esta orden fue cancelada.'},
};

function fmt(n){ return 'S/ ' + parseFloat(n||0).toFixed(2); }
function fmtDate(d){
  if(!d) return '';
  return new Date(d).toLocaleString('es-PE',{day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'});
}
function fmtDateShort(d){
  if(!d) return '';
  return new Date(d).toLocaleDateString('es-PE',{day:'2-digit',month:'short'}) + ' ' +
    new Date(d).toLocaleTimeString('es-PE',{hour:'2-digit',minute:'2-digit'});
}

async function cargar(){
  if(!token || token.length < 8){ mostrarError('Enlace invalido','Este enlace no es valido.'); return; }
  try{
    var res  = await fetch(API_BASE + '/portal/' + token);
    var data = await res.json();
    if(!data.success){ mostrarError('No encontrado', data.message||'Enlace expirado.'); return; }
    renderOT(data.data);
  } catch(e){
    mostrarError('Error de conexion','No se pudo cargar la informacion.');
  }
}

function renderOT(o){
  var cfg  = ESTADO_CFG[o.estado] || ESTADO_CFG.pendiente;
  var eInfo = ESTADOS.find(function(e){return e.key===o.estado;}) || ESTADOS[0];
  var total = parseFloat(o.total_real)>0 ? o.total_real : o.total_estimado;
  var totalLabel = parseFloat(o.total_real)>0 ? 'Total a pagar' : 'Presupuesto estimado';

  var html = '<div class="card estado-hero">'
    + '<div class="estado-icon">'+eInfo.icon+'</div>'
    + '<div class="estado-label" style="color:'+cfg.color+'">'+eInfo.label+'</div>'
    + '<div class="estado-sub">'+cfg.desc+'</div>'
    + '<div class="progreso-bar"><div class="progreso-fill" style="width:'+cfg.pct+'%;background:'+cfg.color+'"></div></div>'
    + '<div class="progreso-labels"><span>Recibido</span><span>En proceso</span><span>Entregado</span></div>'
    + '</div>';

  html += '<div class="card">'
    + '<div class="card-title">Vehiculo</div>'
    + '<div class="info-grid">'
    + '<div class="info-item"><label>Placa</label><span style="color:var(--accent);font-size:1.05rem">'+o.placa+'</span></div>'
    + '<div class="info-item"><label>Vehiculo</label><span>'+(o.marca||'')+' '+(o.modelo||'')+' '+(o.anio||'')+'</span></div>'
    + '<div class="info-item"><label>Color</label><span>'+(o.color||'-')+'</span></div>'
    + '<div class="info-item"><label>KM ingreso</label><span>'+(o.km_entrada||0)+' km</span></div>'
    + '</div></div>';

  html += '<div class="card">'
    + '<div class="card-title">Orden de trabajo</div>'
    + '<div class="info-grid">'
    + '<div class="info-item"><label>Codigo OT</label><span style="color:var(--accent)">'+o.codigo+'</span></div>'
    + '<div class="info-item"><label>Fecha ingreso</label><span>'+fmtDate(o.created_at)+'</span></div>'
    + (o.tecnico ? '<div class="info-item"><label>Tecnico</label><span>'+o.tecnico+'</span></div>' : '')
    + (o.diagnostico ? '<div class="info-item" style="grid-column:1/-1"><label>Diagnostico</label><span style="font-weight:400">'+o.diagnostico+'</span></div>' : '')
    + '</div></div>';

  if(o.servicios && o.servicios.length){
    html += '<div class="card"><div class="card-title">Servicios realizados</div>'
      + '<table><thead><tr><th>Servicio</th><th style="text-align:right">Precio</th></tr></thead><tbody>'
      + o.servicios.map(function(s){return '<tr><td>'+s.nombre+'</td><td style="text-align:right;font-weight:600">'+fmt(s.precio_cobrado)+'</td></tr>';}).join('')
      + '</tbody></table></div>';
  }

  if(o.repuestos && o.repuestos.length){
    html += '<div class="card"><div class="card-title">Repuestos utilizados</div>'
      + '<table><thead><tr><th>Repuesto</th><th style="text-align:center">Cant.</th><th style="text-align:right">Total</th></tr></thead><tbody>'
      + o.repuestos.map(function(r){return '<tr><td>'+r.nombre+'</td><td style="text-align:center">'+r.cantidad+'</td><td style="text-align:right;font-weight:600">'+fmt(parseFloat(r.precio_unitario)*parseInt(r.cantidad))+'</td></tr>';}).join('')
      + '</tbody></table></div>';
  }

  if(parseFloat(total)>0){
    html += '<div class="costo-box"><div><div class="label">'+totalLabel+'</div>'
      + '<div style="font-size:.72rem;color:var(--text2);margin-top:2px">'+(parseFloat(o.total_real)>0?'Monto final':'Puede variar')+'</div></div>'
      + '<div class="monto">'+fmt(total)+'</div></div>';
  }

  if(o.historial && o.historial.length){
    html += '<div class="card" style="margin-top:14px"><div class="card-title">Seguimiento paso a paso</div>'
      + '<div class="timeline">'
      + o.historial.map(function(h,i){
          var isDone = i < o.historial.length-1;
          var isCurrent = i === o.historial.length-1;
          var eI = ESTADOS.find(function(e){return e.key===h.estado_nuevo;});
          return '<div class="tl-item '+(isDone?'tl-done':'')+(isCurrent?' tl-current':'')+'">'
            +'<div class="tl-dot">'+(eI?eI.icon:'•')+'</div>'
            +'<div class="tl-content" style="color:'+(isCurrent?'var(--accent)':'')+'">'+((eI&&eI.label)||h.estado_nuevo)+'</div>'
            +'<div class="tl-time">'+fmtDateShort(h.created_at)+'</div>'
            +(h.descripcion?'<div style="font-size:.78rem;color:var(--text2);margin-top:2px">'+h.descripcion+'</div>':'')
            +'</div>';
        }).join('')
      + '</div></div>';
  }

  if(o.evidencias && o.evidencias.filter(function(e){return e.tipo==='foto';}).length){
    html += '<div class="card"><div class="card-title">Evidencias fotograficas</div>'
      + '<div class="evidencias">'
      + o.evidencias.filter(function(e){return e.tipo==='foto';}).map(function(e){
          return '<img src="/mecanica'+e.url+'" loading="lazy" onclick="window.open(this.src,\'_blank\')">';
        }).join('')
      + '</div></div>';
  }

  document.getElementById('content').innerHTML = html;
  document.getElementById('footer').innerHTML = 'Ultima actualizacion: '+fmtDate(o.updated_at)+' - MecanicaPro';
}

function mostrarError(titulo, msg){
  document.getElementById('content').innerHTML = '<div class="card error-card">'
    +'<div style="font-size:2.5rem;margin-bottom:10px">&#10060;</div>'
    +'<h2 style="color:var(--red);margin-bottom:8px">'+titulo+'</h2>'
    +'<p style="color:var(--text2)">'+msg+'</p>'
    +'</div>';
}

cargar();
setInterval(function(){
  var lbl = document.querySelector('.estado-label');
  if(lbl && lbl.textContent !== 'Entregado' && lbl.textContent !== 'Cancelado') cargar();
}, 120000);
</script>
</body>
</html>
