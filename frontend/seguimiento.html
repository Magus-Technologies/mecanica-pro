<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Seguimiento de mi vehículo — MecánicaPro</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0d0f14; --bg2:#13161e; --bg3:#1a1e2a; --border:#252a38;
  --accent:#f97316; --green:#22c55e; --red:#ef4444; --blue:#3b82f6;
  --yellow:#eab308; --purple:#a855f7; --text:#e8eaf0; --text2:#8b92a8;
  --radius:10px; --radius-lg:16px;
}
*,*::before,*::after { box-sizing:border-box; margin:0; padding:0; }
body { font-family:'DM Sans',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }
h1,h2,h3 { font-family:'Syne',sans-serif; }

/* Header */
.header { background:var(--bg2); border-bottom:1px solid var(--border); padding:16px 20px; display:flex; align-items:center; gap:12px; position:sticky; top:0; z-index:10; }
.header-logo { width:36px; height:36px; background:var(--accent); border-radius:10px; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
.header h1 { font-size:1.1rem; }
.header p { font-size:.78rem; color:var(--text2); }

/* Container */
.container { max-width:640px; margin:0 auto; padding:20px 16px 40px; }

/* Estado hero */
.estado-hero { background:var(--bg2); border:1px solid var(--border); border-radius:var(--radius-lg); padding:24px 20px; text-align:center; margin-bottom:20px; }
.estado-icon { font-size:3rem; margin-bottom:12px; }
.estado-label { font-size:1.3rem; font-weight:700; margin-bottom:6px; }
.estado-sub { font-size:.88rem; color:var(--text2); }
.progreso-bar { margin:20px 0 0; background:var(--bg3); border-radius:20px; height:8px; overflow:hidden; }
.progreso-fill { height:100%; border-radius:20px; background:var(--accent); transition:width .6s ease; }

/* Cards */
.card { background:var(--bg2); border:1px solid var(--border); border-radius:var(--radius-lg); padding:18px 16px; margin-bottom:14px; }
.card-title { font-size:.9rem; font-weight:700; margin-bottom:14px; display:flex; align-items:center; gap:8px; }
.info-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
.info-item label { display:block; font-size:.72rem; color:var(--text2); text-transform:uppercase; letter-spacing:.04em; margin-bottom:3px; }
.info-item span { font-size:.9rem; font-weight:600; }

/* Timeline */
.timeline { position:relative; padding-left:28px; }
.timeline::before { content:''; position:absolute; left:9px; top:0; bottom:0; width:2px; background:var(--border); }
.tl-item { position:relative; margin-bottom:16px; }
.tl-item:last-child { margin-bottom:0; }
.tl-dot { position:absolute; left:-28px; width:20px; height:20px; border-radius:50%; background:var(--bg3); border:2px solid var(--border); display:flex; align-items:center; justify-content:center; font-size:.65rem; top:2px; }
.tl-item.done .tl-dot { background:rgba(34,197,94,.2); border-color:var(--green); color:var(--green); }
.tl-item.current .tl-dot { background:rgba(249,115,22,.2); border-color:var(--accent); color:var(--accent); animation:pulse 1.5s infinite; }
@keyframes pulse { 0%,100%{box-shadow:0 0 0 0 rgba(249,115,22,.4)} 50%{box-shadow:0 0 0 6px rgba(249,115,22,0)} }
.tl-content { font-size:.85rem; font-weight:600; }
.tl-time { font-size:.75rem; color:var(--text2); margin-top:2px; }
.tl-desc { font-size:.8rem; color:var(--text2); margin-top:3px; }

/* Tabla */
table { width:100%; border-collapse:collapse; font-size:.85rem; }
th { text-align:left; padding:8px 10px; color:var(--text2); font-size:.75rem; text-transform:uppercase; border-bottom:1px solid var(--border); }
td { padding:10px; border-bottom:1px solid rgba(37,42,56,.5); }
tr:last-child td { border-bottom:none; }

/* Costo total */
.costo-total { background:rgba(249,115,22,.08); border:1px solid rgba(249,115,22,.2); border-radius:var(--radius); padding:16px; display:flex; justify-content:space-between; align-items:center; margin-top:12px; }
.costo-total .label { font-size:.85rem; color:var(--text2); }
.costo-total .monto { font-family:'Syne',sans-serif; font-size:1.5rem; font-weight:800; color:var(--accent); }

/* Evidencias */
.evidencias-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; }
.evidencias-grid img { width:100%; aspect-ratio:1; object-fit:cover; border-radius:8px; cursor:pointer; border:1px solid var(--border); }

/* Skeleton */
.skeleton { background:linear-gradient(90deg,var(--bg3) 25%,var(--border) 50%,var(--bg3) 75%); background-size:200%; animation:shimmer 1.4s infinite; border-radius:8px; }
@keyframes shimmer { from{background-position:200%} to{background-position:-200%} }

/* Footer */
.footer { text-align:center; padding:24px 16px; color:var(--text2); font-size:.8rem; }

/* Error */
.error-card { text-align:center; padding:40px 20px; }
.error-card h2 { color:var(--red); margin-bottom:8px; }

@media (max-width:420px) {
  .info-grid { grid-template-columns:1fr; }
  .evidencias-grid { grid-template-columns:repeat(2,1fr); }
}
</style>
</head>
<body>

<div class="header">
  <div class="header-logo">
    <svg width="20" height="20" viewBox="0 0 44 44" fill="none">
      <path d="M14 22l5 5 11-11" stroke="#fff" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </div>
  <div>
    <h1>MecánicaPro</h1>
    <p>Seguimiento de tu vehículo</p>
  </div>
</div>

<div class="container" id="content">
  <!-- Skeleton loading -->
  <div class="card" style="margin-bottom:14px">
    <div class="skeleton" style="height:120px;border-radius:10px"></div>
  </div>
  <div class="card"><div class="skeleton" style="height:80px;border-radius:8px"></div></div>
  <div class="card"><div class="skeleton" style="height:160px;border-radius:8px"></div></div>
</div>

<div class="footer" id="footer"></div>

<script>
const API_BASE = '/mecanica/api';

// Obtener token de la URL: /mecanica/seguimiento/TOKEN
const pathParts = window.location.pathname.split('/');
const token = pathParts[pathParts.length - 1] || pathParts[pathParts.length - 2];

const ESTADOS_FLUJO = [
  { key:'pendiente',   label:'Recibido',      icon:'📥' },
  { key:'diagnostico', label:'Diagnóstico',   icon:'🔍' },
  { key:'aprobado',    label:'Aprobado',      icon:'✅' },
  { key:'en_proceso',  label:'En reparación', icon:'🔧' },
  { key:'terminado',   label:'Terminado',     icon:'✔️' },
  { key:'facturado',   label:'Facturado',     icon:'🧾' },
  { key:'entregado',   label:'Entregado',     icon:'🎉' },
];

const ESTADO_CONFIG = {
  pendiente:   { color:'#eab308', pct:10,  desc:'Su vehículo ha sido recibido y está en espera de revisión.' },
  diagnostico: { color:'#3b82f6', pct:25,  desc:'Nuestro técnico está analizando su vehículo.' },
  aprobado:    { color:'#22c55e', pct:40,  desc:'El presupuesto fue aprobado, pronto iniciamos la reparación.' },
  rechazado:   { color:'#ef4444', pct:0,   desc:'El presupuesto fue rechazado.' },
  en_proceso:  { color:'#f97316', pct:60,  desc:'Su vehículo está siendo reparado por nuestro equipo.' },
  terminado:   { color:'#a855f7', pct:85,  desc:'La reparación ha terminado, pendiente de facturación.' },
  facturado:   { color:'#22c55e', pct:95,  desc:'Listo para recoger. Por favor pase por el taller.' },
  entregado:   { color:'#22c55e', pct:100, desc:'Vehículo entregado. ¡Gracias por confiar en nosotros!' },
  cancelado:   { color:'#6b7280', pct:0,   desc:'Esta orden fue cancelada.' },
};

function fmt(n) { return `S/ ${parseFloat(n||0).toFixed(2)}`; }
function fmtDate(d) {
  if (!d) return '—';
  return new Date(d).toLocaleString('es-PE', { day:'2-digit', month:'2-digit', year:'numeric', hour:'2-digit', minute:'2-digit' });
}
function fmtDateShort(d) {
  if (!d) return '';
  return new Date(d).toLocaleDateString('es-PE', { day:'2-digit', month:'short', hour:'2-digit', minute:'2-digit' });
}

async function cargar() {
  if (!token || token.length < 8) {
    mostrarError('Enlace inválido', 'Este enlace de seguimiento no es válido.');
    return;
  }
  try {
    const res  = await fetch(`${API_BASE}/portal/${token}`);
    const data = await res.json();
    if (!data.success) { mostrarError('No encontrado', data.message || 'Enlace expirado o inválido.'); return; }
    renderOT(data.data);
  } catch(e) {
    mostrarError('Error de conexión', 'No se pudo cargar la información. Intenta de nuevo.');
  }
}

function renderOT(o) {
  const cfg  = ESTADO_CONFIG[o.estado] || ESTADO_CONFIG.pendiente;
  const idx  = ESTADOS_FLUJO.findIndex(e => e.key === o.estado);
  const eInfo = ESTADOS_FLUJO.find(e => e.key === o.estado) || ESTADOS_FLUJO[0];

  const total = parseFloat(o.total_real) > 0 ? o.total_real : o.total_estimado;
  const totalLabel = parseFloat(o.total_real) > 0 ? 'Total a pagar' : 'Presupuesto estimado';

  let html = `
    <!-- Estado hero -->
    <div class="estado-hero">
      <div class="estado-icon">${eInfo.icon}</div>
      <div class="estado-label" style="color:${cfg.color}">${eInfo.label}</div>
      <div class="estado-sub">${cfg.desc}</div>
      <div class="progreso-bar">
        <div class="progreso-fill" style="width:${cfg.pct}%;background:${cfg.color}"></div>
      </div>
      <div style="display:flex;justify-content:space-between;font-size:.72rem;color:var(--text2);margin-top:6px">
        <span>Recibido</span><span>En proceso</span><span>Entregado</span>
      </div>
    </div>

    <!-- Info vehículo + OT -->
    <div class="card">
      <div class="card-title">🚗 Tu vehículo</div>
      <div class="info-grid">
        <div class="info-item"><label>Placa</label><span style="color:var(--accent);font-size:1.1rem">${o.placa}</span></div>
        <div class="info-item"><label>Vehículo</label><span>${o.marca||''} ${o.modelo||''} ${o.anio||''}</span></div>
        <div class="info-item"><label>Color</label><span>${o.color||'—'}</span></div>
        <div class="info-item"><label>Tipo</label><span style="text-transform:capitalize">${o.vehiculo_tipo||'—'}</span></div>
        <div class="info-item"><label>KM ingreso</label><span>${(o.km_entrada||0).toLocaleString()} km</span></div>
        ${o.km_salida ? `<div class="info-item"><label>KM salida</label><span>${o.km_salida.toLocaleString()} km</span></div>` : ''}
      </div>
    </div>

    <div class="card">
      <div class="card-title">📋 Orden de trabajo</div>
      <div class="info-grid">
        <div class="info-item"><label>Código OT</label><span style="color:var(--accent)">${o.codigo}</span></div>
        <div class="info-item"><label>Fecha ingreso</label><span>${fmtDate(o.created_at)}</span></div>
        ${o.tecnico ? `<div class="info-item"><label>Técnico</label><span>${o.tecnico}</span></div>` : ''}
        ${o.fecha_prometida ? `<div class="info-item"><label>Fecha prometida</label><span>${fmtDate(o.fecha_prometida)}</span></div>` : ''}
        ${o.diagnostico ? `<div class="info-item" style="grid-column:1/-1"><label>Diagnóstico</label><span style="font-weight:400;line-height:1.4">${o.diagnostico}</span></div>` : ''}
      </div>
    </div>`;

  // Servicios
  if (o.servicios?.length) {
    html += `
    <div class="card">
      <div class="card-title">🔧 Servicios realizados</div>
      <table>
        <thead><tr><th>Servicio</th><th style="text-align:right">Precio</th></tr></thead>
        <tbody>
          ${o.servicios.map(s => `
            <tr><td>${s.nombre}</td><td style="text-align:right;font-weight:600">${fmt(s.precio_cobrado)}</td></tr>
          `).join('')}
        </tbody>
      </table>
    </div>`;
  }

  // Repuestos
  if (o.repuestos?.length) {
    html += `
    <div class="card">
      <div class="card-title">📦 Repuestos utilizados</div>
      <table>
        <thead><tr><th>Repuesto</th><th style="text-align:center">Cant.</th><th style="text-align:right">Total</th></tr></thead>
        <tbody>
          ${o.repuestos.map(r => `
            <tr>
              <td>${r.nombre}</td>
              <td style="text-align:center">${r.cantidad}</td>
              <td style="text-align:right;font-weight:600">${fmt(parseFloat(r.precio_unitario)*parseInt(r.cantidad))}</td>
            </tr>
          `).join('')}
        </tbody>
      </table>
    </div>`;
  }

  // Costo total
  if (parseFloat(total) > 0) {
    html += `
    <div class="costo-total">
      <div><div class="label">${totalLabel}</div><div style="font-size:.75rem;color:var(--text2);margin-top:2px">${parseFloat(o.total_real)>0?'Monto final':'Puede variar según avance'}</div></div>
      <div class="monto">${fmt(total)}</div>
    </div>`;
  }

  // Timeline historial
  if (o.historial?.length) {
    html += `
    <div class="card" style="margin-top:14px">
      <div class="card-title">📅 Seguimiento paso a paso</div>
      <div class="timeline">
        ${o.historial.map((h, i) => {
          const isDone    = i < o.historial.length - 1;
          const isCurrent = i === o.historial.length - 1;
          const eI = ESTADOS_FLUJO.find(e => e.key === h.estado_nuevo);
          return `
          <div class="tl-item ${isDone?'done':''} ${isCurrent?'current':''}">
            <div class="tl-dot">${eI?.icon||'•'}</div>
            <div class="tl-content" style="color:${isCurrent?'var(--accent)':''}">${eI?.label||h.estado_nuevo}</div>
            <div class="tl-time">${fmtDateShort(h.created_at)}</div>
            ${h.descripcion ? `<div class="tl-desc">${h.descripcion}</div>` : ''}
          </div>`;
        }).join('')}
      </div>
    </div>`;
  }

  // Evidencias
  if (o.evidencias?.length) {
    html += `
    <div class="card">
      <div class="card-title">📸 Evidencias fotográficas</div>
      <div class="evidencias-grid">
        ${o.evidencias.filter(e=>e.tipo==='foto').map(e =>
          `<img src="/mecanica${e.url}" alt="${e.descripcion||'evidencia'}"
               onclick="window.open('/mecanica${e.url}','_blank')"
               loading="lazy">`
        ).join('')}
      </div>
    </div>`;
  }

  document.getElementById('content').innerHTML = html;
  document.getElementById('footer').innerHTML =
    `Última actualización: ${fmtDate(o.updated_at)} · MecánicaPro`;
}

function mostrarError(titulo, msg) {
  document.getElementById('content').innerHTML = `
    <div class="card error-card">
      <div style="font-size:3rem;margin-bottom:12px">❌</div>
      <h2>${titulo}</h2>
      <p style="color:var(--text2);margin-top:8px">${msg}</p>
    </div>`;
}

cargar();

// Auto-refresh cada 2 minutos si la OT no está entregada
setInterval(() => {
  const estado = document.querySelector('.estado-label');
  if (estado && !['Entregado','Cancelado'].includes(estado.textContent)) cargar();
}, 120000);
</script>
</body>
</html>
