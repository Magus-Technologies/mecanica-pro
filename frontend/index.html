<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MecánicaPro</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/app.css">
</head>
<body>

<!-- ═══════════════════════════════════════════════════════ LOGIN ═══ -->
<div id="loginScreen" class="login-screen">
  <div class="login-card">
    <div class="login-logo">
      <svg width="44" height="44" viewBox="0 0 44 44" fill="none">
        <rect width="44" height="44" rx="12" fill="#f97316"/>
        <path d="M14 22l5 5 11-11" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
        <circle cx="22" cy="22" r="10" stroke="#fff" stroke-width="2" fill="none" opacity=".3"/>
      </svg>
      <span>MecánicaPro</span>
    </div>
    <h2>Iniciar sesión</h2>
    <div id="loginError" class="login-error hidden"></div>
    <form id="loginForm">
      <label>Usuario</label>
      <input type="text" id="loginUser" placeholder="admin" autocomplete="username" required>
      <label>Contraseña</label>
      <input type="password" id="loginPass" placeholder="••••••••" autocomplete="current-password" required>
      <button type="submit" id="loginBtn" class="btn-primary">Ingresar</button>
    </form>
  </div>
</div>

<!-- ═══════════════════════════════════════════════════════ APP ════ -->
<div id="app" class="app hidden">

  <!-- Sidebar -->
  <aside id="sidebar" class="sidebar">
    <div class="sidebar-logo">
      <svg width="32" height="32" viewBox="0 0 44 44" fill="none">
        <rect width="44" height="44" rx="12" fill="#f97316"/>
        <path d="M14 22l5 5 11-11" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <span>MecánicaPro</span>
    </div>
    <nav class="sidebar-nav">
      <a href="#" class="nav-item active" data-page="dashboard">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
        Dashboard
      </a>
      <a href="#" class="nav-item" data-page="ots">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg>
        Órdenes de Trabajo
      </a>
      <a href="#" class="nav-item" data-page="clientes">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75"/></svg>
        Clientes
      </a>
      <a href="#" class="nav-item" data-page="vehiculos">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 17H3a2 2 0 01-2-2V5a2 2 0 012-2h11l5 5v5M16 17h2"/><circle cx="7.5" cy="17.5" r="2.5"/><circle cx="17.5" cy="17.5" r="2.5"/></svg>
        Vehículos
      </a>
      <a href="#" class="nav-item" data-page="inventario">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10"/></svg>
        Inventario
      </a>
      <a href="#" class="nav-item" data-page="servicios">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14.7 6.3a1 1 0 000 1.4l1.6 1.6a1 1 0 001.4 0l3.77-3.77a6 6 0 01-7.94 7.94l-6.91 6.91a2.12 2.12 0 01-3-3l6.91-6.91a6 6 0 017.94-7.94l-3.76 3.76z"/></svg>
        Servicios
      </a>
      <a href="#" class="nav-item" data-page="tecnicos">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        Técnicos
      </a>
      <a href="#" class="nav-item" data-page="ventas">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><path d="M14 2v6h6M16 13H8M16 17H8M10 9H8"/></svg>
        Ventas
      </a>
      <a href="#" class="nav-item" data-page="caja">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 21V5a2 2 0 00-2-2h-4a2 2 0 00-2 2v16"/></svg>
        Caja
      </a>
      <a href="#" class="nav-item" data-page="compras">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/></svg>
        Compras
      </a>
      <a href="#" class="nav-item" data-page="reportes">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
        Reportes
      </a>
      <a href="#" class="nav-item" data-page="config">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-2 2 2 2 0 01-2-2v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83 0 2 2 0 010-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 01-2-2 2 2 0 012-2h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 010-2.83 2 2 0 012.83 0l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 012-2 2 2 0 012 2v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 0 2 2 0 010 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 012 2 2 2 0 01-2 2h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
        Configuración
      </a>
    </nav>
    <div class="sidebar-footer">
      <div class="user-info">
        <div class="user-avatar" id="userAvatar">A</div>
        <div>
          <div class="user-name" id="userName">Admin</div>
          <div class="user-role" id="userRole">admin</div>
        </div>
      </div>
      <button class="btn-logout" id="logoutBtn" title="Cerrar sesión">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4M16 17l5-5-5-5M21 12H9"/></svg>
      </button>
    </div>
  </aside>

  <!-- Main -->
  <main class="main-content" id="mainContent">
    <div id="pageContainer"></div>
  </main>

  <!-- Overlay sidebar mobile -->
  <div id="sidebarOverlay" class="sidebar-overlay hidden"></div>

  <!-- Hamburger mobile -->
  <button class="hamburger" id="hamburgerBtn">
    <span></span><span></span><span></span>
  </button>
</div>

<!-- Toast -->
<div id="toastContainer" class="toast-container"></div>

<!-- Modal container -->
<div id="modalContainer"></div>

<script src="js/api.js"></script>
<script src="js/utils.js"></script>
<script src="js/pages/dashboard.js"></script>
<script src="js/pages/ots.js"></script>
<script src="js/pages/clientes.js"></script>
<script src="js/pages/vehiculos.js"></script>
<script src="js/pages/inventario.js"></script>
<script src="js/pages/servicios.js"></script>
<script src="js/pages/tecnicos.js"></script>
<script src="js/pages/ventas.js"></script>
<script src="js/pages/caja.js"></script>
<script src="js/pages/compras.js"></script>
<script src="js/pages/reportes.js"></script>
<script src="js/pages/config.js"></script>
<script src="js/app.js"></script>
</body>
</html>
